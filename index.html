<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0a">
    <title>Audio Manipulator</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
            padding-top: env(safe-area-inset-top, 20px);
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
            padding-top: 12px;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
        }

        .file-picker {
            border: 2px dashed #333;
            border-radius: 8px;
            padding: 24px;
            text-align: center;
            margin-bottom: 24px;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .file-picker:active {
            border-color: #4a9eff;
        }

        .file-picker .icon {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .file-picker .label {
            color: #888;
            font-size: 14px;
        }

        .file-picker input[type="file"] {
            display: none;
        }

        .now-playing {
            background: #141414;
            border-radius: 8px;
            padding: 14px;
            margin-bottom: 24px;
        }

        .now-playing .tag {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .now-playing .filename {
            font-size: 15px;
            color: #ccc;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .now-playing .track-count {
            font-size: 11px;
            color: #555;
            margin-top: 4px;
        }

        .transport {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            margin-bottom: 28px;
        }

        .transport-btn {
            width: 44px;
            height: 44px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.15s;
        }

        .transport-btn:active {
            background: #333;
        }

        .transport-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .transport-btn .icon {
            font-size: 14px;
            color: #e0e0e0;
            line-height: 1;
        }

        .play-btn {
            width: 60px;
            height: 60px;
            background: #e0e0e0;
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.15s;
        }

        .play-btn:active {
            background: #bbb;
        }

        .play-btn:disabled {
            background: #333;
            cursor: not-allowed;
        }

        .play-btn .icon {
            font-size: 22px;
            color: #000;
            line-height: 1;
        }

        .play-btn:disabled .icon {
            color: #666;
        }

        .seek-group {
            background: #141414;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .seek-time {
            display: flex;
            justify-content: space-between;
            margin-top: 6px;
        }

        .seek-time span {
            font-size: 12px;
            color: #888;
            font-family: 'SF Mono', SFMono-Regular, Menlo, monospace;
        }

        .semitone-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-top: 12px;
        }

        .semitone-btn {
            width: 44px;
            height: 44px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
        }

        .semitone-btn:active {
            background: #333;
        }

        .semitone-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .semitone-display {
            text-align: center;
            min-width: 80px;
        }

        .semitone-display .value {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            font-family: 'SF Mono', SFMono-Regular, Menlo, monospace;
        }

        .semitone-display .label {
            font-size: 11px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 2px;
        }

        .control-group {
            background: #141414;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .control-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .control-label {
            font-size: 13px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .control-value {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            font-family: 'SF Mono', SFMono-Regular, Menlo, monospace;
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 6px;
            background: #333;
            border-radius: 3px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 22px;
            height: 22px;
            background: #fff;
            border-radius: 50%;
            cursor: pointer;
        }

        .range-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 6px;
        }

        .range-labels span {
            font-size: 11px;
            color: #555;
        }

        .toggle-group {
            background: #141414;
            border-radius: 8px;
            padding: 14px 16px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .toggle-label {
            font-size: 13px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .toggle-switch {
            position: relative;
            width: 48px;
            height: 28px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #333;
            border-radius: 14px;
            transition: background 0.2s;
        }

        .toggle-slider::before {
            content: '';
            position: absolute;
            width: 22px;
            height: 22px;
            left: 3px;
            bottom: 3px;
            background: #fff;
            border-radius: 50%;
            transition: transform 0.2s;
        }

        .toggle-switch input:checked + .toggle-slider {
            background: #4a9eff;
        }

        .toggle-switch input:checked + .toggle-slider::before {
            transform: translateX(20px);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Audio Manipulator</h1>
    </div>

    <div class="file-picker" id="filePicker">
        <div class="icon">&#128194;</div>
        <div class="label">Tap to load a folder</div>
        <input type="file" id="fileInput" accept=".wav,audio/wav" webkitdirectory>
    </div>

    <div class="now-playing">
        <div class="tag">Now Playing</div>
        <div class="filename" id="fileName">No folder loaded</div>
        <div class="track-count" id="trackCount"></div>
    </div>

    <div class="transport">
        <button class="transport-btn" id="prevBtn" disabled>
            <span class="icon">&#9198;</span>
        </button>
        <button class="transport-btn" id="restartBtn" disabled>
            <span class="icon">&#9632;</span>
        </button>
        <button class="play-btn" id="playBtn" disabled>
            <span class="icon" id="playIcon">&#9654;</span>
        </button>
        <button class="transport-btn" id="nextBtn" disabled>
            <span class="icon">&#9197;</span>
        </button>
    </div>

    <div class="seek-group">
        <input type="range" id="seekSlider" min="0" max="1000" step="1" value="0" disabled>
        <div class="seek-time">
            <span id="currentTime">0:00</span>
            <span id="totalTime">0:00</span>
        </div>
    </div>

    <div class="control-group">
        <div class="control-header">
            <span class="control-label">Speed / Pitch</span>
            <span class="control-value" id="rateValue">100%</span>
        </div>
        <input type="range" id="rateSlider" min="25" max="200" step="1" value="100">
        <div class="range-labels">
            <span>25%</span>
            <span>200%</span>
        </div>
        <div class="semitone-controls">
            <button class="semitone-btn" id="semitoneDown">&#9664;</button>
            <div class="semitone-display">
                <div class="value" id="semitoneValue">0 st</div>
                <div class="label">semitones</div>
            </div>
            <button class="semitone-btn" id="semitoneUp">&#9654;</button>
        </div>
    </div>

    <div class="control-group">
        <div class="control-header">
            <span class="control-label">Volume</span>
            <span class="control-value" id="volumeValue">80%</span>
        </div>
        <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.8">
        <div class="range-labels">
            <span>0%</span>
            <span>100%</span>
        </div>
    </div>

    <div class="toggle-group">
        <span class="toggle-label">Autoplay</span>
        <label class="toggle-switch">
            <input type="checkbox" id="autoplayToggle" checked>
            <span class="toggle-slider"></span>
        </label>
    </div>

    <script>
    const filePicker = document.getElementById('filePicker');
    const fileInput = document.getElementById('fileInput');
    const fileName = document.getElementById('fileName');
    const trackCount = document.getElementById('trackCount');
    const playBtn = document.getElementById('playBtn');
    const playIcon = document.getElementById('playIcon');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const restartBtn = document.getElementById('restartBtn');
    const rateSlider = document.getElementById('rateSlider');
    const rateValue = document.getElementById('rateValue');
    const volumeSlider = document.getElementById('volumeSlider');
    const volumeValue = document.getElementById('volumeValue');
    const seekSlider = document.getElementById('seekSlider');
    const currentTimeEl = document.getElementById('currentTime');
    const totalTimeEl = document.getElementById('totalTime');
    const semitoneUp = document.getElementById('semitoneUp');
    const semitoneDown = document.getElementById('semitoneDown');
    const semitoneValue = document.getElementById('semitoneValue');
    const autoplayToggle = document.getElementById('autoplayToggle');

    let audioCtx = null;
    let audioBuffer = null;
    let sourceNode = null;
    let gainNode = null;
    let isPlaying = false;
    let segmentStartTime = 0;
    let bufferOffset = 0;
    let currentRate = 1.0;
    let isSeeking = false;
    let animFrameId = null;
    let semitones = 0;
    const SEMITONE = Math.pow(2, 1 / 12);

    // Playlist state
    let playlist = [];
    let currentTrackIndex = -1;

    filePicker.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', (e) => {
        const files = Array.from(e.target.files)
            .filter(f => f.name.toLowerCase().endsWith('.wav'))
            .sort((a, b) => a.name.localeCompare(b.name));

        if (files.length === 0) {
            fileName.textContent = 'No .wav files found';
            trackCount.textContent = '';
            return;
        }

        playlist = files;
        currentTrackIndex = 0;

        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            gainNode = audioCtx.createGain();
            gainNode.gain.value = parseFloat(volumeSlider.value);
            gainNode.connect(audioCtx.destination);
        }

        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }

        loadTrack(0, false);
    });

    function loadTrack(index, autoplay) {
        if (index < 0 || index >= playlist.length) return;

        stopPlayback();
        audioBuffer = null;
        playBtn.disabled = true;
        seekSlider.disabled = true;
        currentTrackIndex = index;
        updateNavButtons();

        fileName.textContent = 'Loading...';

        const file = playlist[index];
        const reader = new FileReader();
        reader.onload = (event) => {
            audioCtx.decodeAudioData(event.target.result)
                .then((buffer) => {
                    audioBuffer = buffer;
                    fileName.textContent = file.name;
                    trackCount.textContent = 'Track ' + (index + 1) + ' of ' + playlist.length;
                    playBtn.disabled = false;
                    restartBtn.disabled = false;
                    seekSlider.disabled = false;
                    seekSlider.value = 0;
                    totalTimeEl.textContent = formatTime(buffer.duration);
                    currentTimeEl.textContent = '0:00';
                    bufferOffset = 0;
                    if (autoplay) {
                        startPlayback();
                    }
                })
                .catch(() => {
                    fileName.textContent = 'Error: could not decode file';
                    trackCount.textContent = '';
                });
        };
        reader.onerror = () => {
            fileName.textContent = 'Error: could not read file';
        };
        reader.readAsArrayBuffer(file);
    }

    function updateNavButtons() {
        prevBtn.disabled = playlist.length === 0 || currentTrackIndex <= 0;
        nextBtn.disabled = playlist.length === 0 || currentTrackIndex >= playlist.length - 1;
    }

    prevBtn.addEventListener('click', () => {
        if (currentTrackIndex > 0) {
            loadTrack(currentTrackIndex - 1, autoplayToggle.checked);
        }
    });

    nextBtn.addEventListener('click', () => {
        if (currentTrackIndex < playlist.length - 1) {
            loadTrack(currentTrackIndex + 1, autoplayToggle.checked);
        }
    });

    restartBtn.addEventListener('click', () => {
        if (!audioBuffer) return;
        const wasPlaying = isPlaying;
        stopPlayback();
        bufferOffset = 0;
        seekSlider.value = 0;
        currentTimeEl.textContent = '0:00';
        if (wasPlaying) {
            startPlayback();
        }
    });

    function formatTime(sec) {
        const m = Math.floor(sec / 60);
        const s = Math.floor(sec % 60);
        return m + ':' + (s < 10 ? '0' : '') + s;
    }

    function updateSeekUI() {
        if (!audioBuffer) return;
        const pos = getCurrentBufferPosition();
        currentTimeEl.textContent = formatTime(pos);
        if (!isSeeking) {
            seekSlider.value = Math.round((pos / audioBuffer.duration) * 1000);
        }
        if (isPlaying) {
            animFrameId = requestAnimationFrame(updateSeekUI);
        }
    }

    function getCurrentBufferPosition() {
        if (!isPlaying) return bufferOffset;
        const wallElapsed = audioCtx.currentTime - segmentStartTime;
        const pos = bufferOffset + wallElapsed * currentRate;
        return audioBuffer ? Math.min(pos, audioBuffer.duration) : pos;
    }

    playBtn.addEventListener('click', () => {
        if (!audioBuffer) return;
        if (isPlaying) {
            pausePlayback();
        } else {
            startPlayback();
        }
    });

    function startPlayback() {
        sourceNode = audioCtx.createBufferSource();
        sourceNode.buffer = audioBuffer;
        currentRate = parseInt(rateSlider.value) / 100;
        sourceNode.playbackRate.value = currentRate;
        sourceNode.connect(gainNode);

        sourceNode.onended = () => {
            if (isPlaying) {
                isPlaying = false;
                bufferOffset = 0;
                playIcon.innerHTML = '&#9654;';
                seekSlider.value = 0;
                currentTimeEl.textContent = '0:00';
                if (animFrameId) cancelAnimationFrame(animFrameId);
                // Auto-advance to next track
                if (autoplayToggle.checked && currentTrackIndex < playlist.length - 1) {
                    loadTrack(currentTrackIndex + 1, true);
                }
            }
        };

        sourceNode.start(0, bufferOffset);
        segmentStartTime = audioCtx.currentTime;
        isPlaying = true;
        playIcon.innerHTML = '&#9646;&#9646;';
        updateSeekUI();
    }

    function pausePlayback() {
        if (!sourceNode) return;
        bufferOffset = getCurrentBufferPosition();
        if (bufferOffset >= audioBuffer.duration) {
            bufferOffset = 0;
        }
        sourceNode.onended = null;
        sourceNode.stop();
        sourceNode = null;
        isPlaying = false;
        playIcon.innerHTML = '&#9654;';
        if (animFrameId) cancelAnimationFrame(animFrameId);
        updateSeekUI();
    }

    function stopPlayback() {
        if (sourceNode) {
            sourceNode.onended = null;
            sourceNode.stop();
            sourceNode = null;
        }
        isPlaying = false;
        bufferOffset = 0;
        playIcon.innerHTML = '&#9654;';
        if (animFrameId) cancelAnimationFrame(animFrameId);
    }

    seekSlider.addEventListener('input', () => {
        if (!audioBuffer) return;
        isSeeking = true;
        const pos = (parseInt(seekSlider.value) / 1000) * audioBuffer.duration;
        currentTimeEl.textContent = formatTime(pos);
    });

    seekSlider.addEventListener('change', () => {
        if (!audioBuffer) return;
        const pos = (parseInt(seekSlider.value) / 1000) * audioBuffer.duration;
        bufferOffset = pos;
        isSeeking = false;
        if (isPlaying) {
            sourceNode.onended = null;
            sourceNode.stop();
            sourceNode = null;
            startPlayback();
        }
    });

    function applyRate(rate) {
        const pct = Math.round(rate * 100);
        rateSlider.value = Math.max(25, Math.min(200, pct));
        rateValue.textContent = pct + '%';
        if (sourceNode && isPlaying) {
            bufferOffset = getCurrentBufferPosition();
            segmentStartTime = audioCtx.currentTime;
            currentRate = rate;
            sourceNode.playbackRate.value = rate;
        } else {
            currentRate = rate;
        }
    }

    function updateSemitoneDisplay() {
        const sign = semitones > 0 ? '+' : '';
        semitoneValue.textContent = sign + semitones + ' st';
        semitoneDown.disabled = semitones <= -12;
        semitoneUp.disabled = semitones >= 12;
    }

    rateSlider.addEventListener('input', () => {
        const pct = parseInt(rateSlider.value);
        const rate = pct / 100;
        rateValue.textContent = pct + '%';
        semitones = Math.round(12 * Math.log2(rate));
        updateSemitoneDisplay();
        if (sourceNode && isPlaying) {
            bufferOffset = getCurrentBufferPosition();
            segmentStartTime = audioCtx.currentTime;
            currentRate = rate;
            sourceNode.playbackRate.value = rate;
        }
    });

    semitoneUp.addEventListener('click', () => {
        if (semitones >= 12) return;
        semitones++;
        applyRate(Math.pow(SEMITONE, semitones));
        updateSemitoneDisplay();
    });

    semitoneDown.addEventListener('click', () => {
        if (semitones <= -12) return;
        semitones--;
        applyRate(Math.pow(SEMITONE, semitones));
        updateSemitoneDisplay();
    });

    volumeSlider.addEventListener('input', () => {
        const vol = parseFloat(volumeSlider.value);
        volumeValue.textContent = Math.round(vol * 100) + '%';
        if (gainNode) {
            gainNode.gain.value = vol;
        }
    });
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }
    </script>
</body>
</html>
